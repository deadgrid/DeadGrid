<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEAD GRID</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#05060a;
    font-family:'Courier New', monospace;
  }
  #gameCanvas {
    display:block;
    background: radial-gradient(ellipse at center, #14181f 0%, #05060a 70%);
    touch-action:none;
  }
  #hud {
    position:fixed; top:0; left:0; width:100%;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 20px;
    pointer-events:none;
    z-index:10;
  }
  .hud-box {
    background:rgba(10,12,16,0.6);
    border:1px solid rgba(110,255,150,0.35);
    border-radius:8px;
    padding:8px 16px;
    color:#9dffa8;
    font-size:18px;
    text-shadow:0 0 8px rgba(110,255,150,0.8);
    box-shadow:0 0 12px rgba(110,255,150,0.15);
    letter-spacing:1px;
  }
  #lives { color:#ff6b6b; text-shadow:0 0 8px rgba(255,80,80,0.8); }
  #highscore { color:#7fd3ff; text-shadow:0 0 8px rgba(80,180,255,0.8); }

  .overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.82);
    backdrop-filter: blur(2px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20;
    text-align:center;
    padding:20px;
  }
  .overlay h1 {
    color:#ff3b3b;
    font-size:56px;
    letter-spacing:8px;
    text-shadow:0 0 20px rgba(255,40,40,0.9), 0 0 40px rgba(255,40,40,0.5);
    margin-bottom:10px;
    animation:flicker 1.6s infinite;
  }
  @keyframes flicker {
    0%,100% { opacity:1; }
    45% { opacity:0.85; }
    50% { opacity:0.6; }
    55% { opacity:0.9; }
  }
  .overlay .subtitle {
    color:#6b7785;
    font-size:13px;
    letter-spacing:3px;
    margin-bottom:24px;
    text-transform:uppercase;
  }
  .overlay p { color:#cfd8e3; font-size:18px; margin:6px 0; }
  .overlay .score-line { color:#9dffa8; font-size:20px; margin:8px 0; }
  .btn-action {
    margin-top:20px;
    padding:14px 36px;
    font-size:18px;
    font-family:'Courier New', monospace;
    letter-spacing:2px;
    background:linear-gradient(145deg, #1b2a1f, #0c1410);
    color:#9dffa8;
    border:2px solid #4caf50;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 18px rgba(80,255,120,0.4);
    transition:all 0.15s ease;
  }
  .btn-action:hover {
    background:linear-gradient(145deg,#27402d,#142016);
    box-shadow:0 0 30px rgba(80,255,120,0.7);
    transform:scale(1.05);
  }
  #startOverlay h1 { color:#7fd3ff; text-shadow:0 0 20px rgba(80,180,255,0.9); }
  #startOverlay .btn-action { border-color:#2196f3; color:#7fd3ff; box-shadow:0 0 18px rgba(80,180,255,0.4); }
  #startOverlay .btn-action:hover { box-shadow:0 0 30px rgba(80,180,255,0.7); }

  .hidden { display:none !important; }

  /* mobile controls */
  #mobileControls {
    position:fixed;
    bottom:18px; left:0; width:100%;
    display:none;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    z-index:15;
    pointer-events:none;
  }
  #joystickZone {
    width:130px; height:130px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(120,200,255,0.3);
    position:relative;
    pointer-events:auto;
  }
  #joystickKnob {
    width:56px; height:56px;
    border-radius:50%;
    background:rgba(120,200,255,0.4);
    border:1px solid rgba(150,220,255,0.7);
    position:absolute;
    top:37px; left:37px;
    box-shadow:0 0 12px rgba(120,200,255,0.6);
  }
  #shootBtn {
    width:90px; height:90px;
    border-radius:50%;
    background:rgba(255,80,80,0.18);
    border:2px solid rgba(255,90,90,0.7);
    color:#ff8888;
    font-size:14px;
    letter-spacing:1px;
    pointer-events:auto;
    box-shadow:0 0 16px rgba(255,80,80,0.4);
  }
  @media (max-width:900px), (pointer:coarse) {
    #mobileControls { display:flex; }
    .hud-box { font-size:14px; padding:6px 12px; }
    .overlay h1 { font-size:36px; letter-spacing:5px; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hud-box" id="score">SCORE: 0</div>
  <div class="hud-box" id="highscore">BEST: 0</div>
  <div class="hud-box" id="lives">LIVES: ❤❤❤</div>
</div>

<div id="startOverlay">
  <div class="overlay">
    <h1>DEAD GRID</h1>
    <div class="subtitle">Human vs Zombie Survival</div>
    <p>WASD to move &nbsp;|&nbsp; SPACE to shoot</p>
    <p>On mobile: use the joystick &amp; fire button</p>
    <button class="btn-action" onclick="startGame()">ENTER THE GRID</button>
  </div>
</div>

<div id="gameOverOverlay" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p class="score-line" id="finalScore">Score: 0</p>
    <p class="score-line" id="finalHigh">Best: 0</p>
    <button class="btn-action" onclick="startGame()">RESTART</button>
</div>

<div id="mobileControls">
  <div id="joystickZone">
    <div id="joystickKnob"></div>
  </div>
  <button id="shootBtn">FIRE</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- Persistent high score ----------
  let highScore = 0;
  try {
    const stored = window.localStorage && window.localStorage.getItem('deadgrid_highscore');
    if (stored) highScore = parseInt(stored, 10) || 0;
  } catch(e) { /* localStorage unavailable, fall back to in-memory only */ }

  function saveHighScore(){
    try {
      if (window.localStorage) window.localStorage.setItem('deadgrid_highscore', String(highScore));
    } catch(e) { /* ignore */ }
  }

  // ---------- Game state ----------
  let player, bullets, zombies, particles, keys, score, lives, gameRunning, spawnTimer, spawnInterval, difficultyTimer, hitFlash;

  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const highscoreEl = document.getElementById('highscore');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const finalHighEl = document.getElementById('finalHigh');

  function initState(){
    player = {
      x: canvas.width/2, y: canvas.height/2,
      size: 26, speed: 4.2, color:'#3aa0ff',
      angle: -Math.PI/2, moving:false, walkCycle:0
    };
    bullets = [];
    zombies = [];
    particles = [];
    keys = {};
    score = 0;
    lives = 3;
    gameRunning = true;
    spawnTimer = 0;
    spawnInterval = 90;
    difficultyTimer = 0;
    hitFlash = 0;
    updateHUD();
  }

  function updateHUD(){
    scoreEl.textContent = 'SCORE: ' + score;
    highscoreEl.textContent = 'BEST: ' + highScore;
    livesEl.textContent = 'LIVES: ' + '❤'.repeat(Math.max(lives,0)) + '♡'.repeat(Math.max(3-lives,0));
  }

  // ---------- Input ----------
  window.addEventListener('keydown', (e)=>{
    keys[e.key.toLowerCase()] = true;
    if (e.code === 'Space'){
      e.preventDefault();
      shoot();
    }
  });
  window.addEventListener('keyup', (e)=>{
    keys[e.key.toLowerCase()] = false;
  });

  // mobile joystick
  let joyActive = false, joyDX = 0, joyDY = 0;
  const joystickZone = document.getElementById('joystickZone');
  const joystickKnob = document.getElementById('joystickKnob');

  function joyStart(e){ joyActive = true; handleJoy(e); }
  function joyMove(e){ if(joyActive) handleJoy(e); }
  function joyEnd(){
    joyActive = false; joyDX = 0; joyDY = 0;
    joystickKnob.style.top = '37px'; joystickKnob.style.left = '37px';
  }
  function handleJoy(e){
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickZone.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.min(Math.hypot(dx,dy), 45);
    const angle = Math.atan2(dy,dx);
    const kx = Math.cos(angle)*dist;
    const ky = Math.sin(angle)*dist;
    joystickKnob.style.left = (37+kx) + 'px';
    joystickKnob.style.top = (37+ky) + 'px';
    joyDX = Math.cos(angle) * (dist/45);
    joyDY = Math.sin(angle) * (dist/45);
    e.preventDefault();
  }
  joystickZone.addEventListener('touchstart', joyStart, {passive:false});
  joystickZone.addEventListener('touchmove', joyMove, {passive:false});
  joystickZone.addEventListener('touchend', joyEnd);
  joystickZone.addEventListener('mousedown', joyStart);
  window.addEventListener('mousemove', joyMove);
  window.addEventListener('mouseup', joyEnd);

  let lastShotTime = 0;
  const shootCooldown = 140; // ms, prevents super-fast click spamming

  const shootBtn = document.getElementById('shootBtn');
  shootBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); shoot(); }, {passive:false});

  // ---------- Game logic ----------
  function getNearestZombie(){
    let target = null, minDist = Infinity;
    for (const z of zombies){
      const d = Math.hypot(z.x-player.x, z.y-player.y);
      if (d < minDist){ minDist = d; target = z; }
    }
    return target;
  }

  function shoot(){
    if (!gameRunning) return;
    const now = performance.now();
    if (now - lastShotTime < shootCooldown) return;
    lastShotTime = now;
    // shoot toward nearest zombie, or current facing angle if none
    const target = getNearestZombie();
    let dx = Math.cos(player.angle), dy = Math.sin(player.angle);
    if (target){
      const len = Math.hypot(target.x-player.x, target.y-player.y) || 1;
      dx = (target.x-player.x)/len;
      dy = (target.y-player.y)/len;
      player.angle = Math.atan2(dy,dx);
    }
    const muzzleDist = player.size*0.95;
    const mx = player.x + dx*muzzleDist;
    const my = player.y + dy*muzzleDist;

    bullets.push({
      x: mx, y: my,
      dx: dx*10, dy: dy*10,
      size:4
    });

    spawnMuzzleFlash(mx, my, player.angle);
    spawnShellCasing(player.x, player.y, player.angle);
  }

  function spawnMuzzleFlash(x,y,angle){
    particles.push({
      kind:'muzzle', x, y, angle,
      dx:0, dy:0, life:6, maxLife:6, size:14
    });
    for (let i=0;i<3;i++){
      const spread = angle + (Math.random()-0.5)*0.6;
      particles.push({
        kind:'spark',
        x, y,
        dx: Math.cos(spread)*(Math.random()*3+2),
        dy: Math.sin(spread)*(Math.random()*3+2),
        life: 10+Math.random()*6, maxLife:16,
        size: Math.random()*1.5+1,
        color:'#ffdd55'
      });
    }
  }

  function spawnShellCasing(x,y,angle){
    const ejectAngle = angle + Math.PI/2 + (Math.random()-0.5)*0.3;
    particles.push({
      kind:'shell',
      x: x + Math.cos(angle)*8,
      y: y + Math.sin(angle)*8,
      dx: Math.cos(ejectAngle)*2.2 + Math.cos(angle)*1.5,
      dy: Math.sin(ejectAngle)*2.2 + Math.sin(angle)*1.5,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.6,
      life: 40, maxLife:40,
      size:3,
      grounded:false
    });
  }

  function spawnBlood(x,y,angle){
    for (let i=0;i<10;i++){
      const spread = angle + (Math.random()-0.5)*2.4;
      const speed = Math.random()*4+1.5;
      particles.push({
        kind:'blood',
        x, y,
        dx: Math.cos(spread)*speed,
        dy: Math.sin(spread)*speed,
        life: 25+Math.random()*15, maxLife:40,
        size: Math.random()*2.5+1.5,
        color: Math.random()>0.5 ? '#a3122a' : '#6e0d1c'
      });
    }
  }

  function spawnZombieDeath(x,y){
    // gibs (chunky rotten flesh chunks)
    for (let i=0;i<10;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*3.5+1;
      particles.push({
        kind:'gib',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        rot: Math.random()*Math.PI*2,
        rotSpeed: (Math.random()-0.5)*0.4,
        life: 45+Math.random()*15, maxLife:60,
        size: Math.random()*4+3,
        color: Math.random()>0.4 ? '#2e7d3a' : '#1f4d27'
      });
    }
    // radioactive glow burst
    for (let i=0;i<16;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*5+1.5;
      particles.push({
        kind:'spark',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        life: 25+Math.random()*20, maxLife:45,
        size: Math.random()*3+1.5,
        color:'#7dffa0'
      });
    }
  }

  function spawnZombie(){
    const side = Math.floor(Math.random()*4);
    let x,y;
    if (side===0){ x = Math.random()*canvas.width; y = -30; }
    else if (side===1){ x = canvas.width+30; y = Math.random()*canvas.height; }
    else if (side===2){ x = Math.random()*canvas.width; y = canvas.height+30; }
    else { x = -30; y = Math.random()*canvas.height; }
    const speed = 1.0 + Math.random()*0.8 + Math.min(score/200, 1.5);
    zombies.push({
      x, y, size:24, speed, color:'#3ecf5a',
      wobble: Math.random()*Math.PI*2,
      bodySeed: Math.random()*10,
      limbPhase: Math.random()*Math.PI*2,
      angle: 0
    });
  }

  function spawnExplosion(x,y,color){
    for (let i=0;i<14;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*4+1;
      particles.push({
        kind:'explosion',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        life: 30+Math.random()*20,
        maxLife: 50,
        size: Math.random()*4+2,
        color
      });
    }
  }

  function update(){
    if (!gameRunning) return;

    // player movement
    let mx=0, my=0;
    if (keys['w']||keys['arrowup']) my -= 1;
    if (keys['s']||keys['arrowdown']) my += 1;
    if (keys['a']||keys['arrowleft']) mx -= 1;
    if (keys['d']||keys['arrowright']) mx += 1;
    if (joyActive){ mx += joyDX; my += joyDY; }
    const mlen = Math.hypot(mx,my);
    if (mlen > 0){
      mx/=mlen; my/=mlen;
      player.x += mx*player.speed;
      player.y += my*player.speed;
      player.moving = true;
      player.walkCycle += 0.22;
    } else {
      player.moving = false;
    }
    player.x = Math.max(player.size, Math.min(canvas.width-player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height-player.size, player.y));

    // player always faces the nearest zombie; if none, face movement direction
    const nearest = getNearestZombie();
    if (nearest){
      player.angle = Math.atan2(nearest.y-player.y, nearest.x-player.x);
    } else if (mlen > 0){
      player.angle = Math.atan2(my, mx);
    }

    // bullets
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.dx; b.y += b.dy;
      if (b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20){
        bullets.splice(i,1);
      }
    }

    // zombies
    for (let i=zombies.length-1;i>=0;i--){
      const z = zombies[i];
      const dx = player.x - z.x, dy = player.y - z.y;
      const len = Math.hypot(dx,dy) || 1;
      z.wobble += 0.15;
      z.limbPhase += 0.15;
      z.angle = Math.atan2(dy,dx);
      z.x += (dx/len)*z.speed + Math.sin(z.wobble)*0.3;
      z.y += (dy/len)*z.speed + Math.cos(z.wobble)*0.3;

      // collision with player
      if (len < player.size*0.7+z.size*0.7){
        zombies.splice(i,1);
        lives -= 1;
        hitFlash = 1;
        spawnExplosion(player.x, player.y, '#ff6b6b');
        updateHUD();
        if (lives <= 0){
          endGame();
          return;
        }
        continue;
      }
    }

    // bullet-zombie collisions
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      for (let j=zombies.length-1;j>=0;j--){
        const z = zombies[j];
        const d = Math.hypot(b.x-z.x, b.y-z.y);
        if (d < z.size*0.7+b.size){
          const hitAngle = Math.atan2(b.dy, b.dx);
          spawnBlood(z.x, z.y, hitAngle);
          spawnZombieDeath(z.x, z.y);
          zombies.splice(j,1);
          bullets.splice(i,1);
          score += 10;
          if (score > highScore){ highScore = score; }
          updateHUD();
          break;
        }
      }
    }

    // particles (physics: shell & gib use gravity+rotation, others float & fade)
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      if (p.kind === 'shell' || p.kind === 'gib'){
        if (!p.grounded){
          p.x += p.dx; p.y += p.dy;
          p.dx *= 0.9; p.dy *= 0.9;
          p.rot += p.rotSpeed;
          if (Math.hypot(p.dx,p.dy) < 0.15) p.grounded = true;
        }
      } else {
        p.x += p.dx; p.y += p.dy;
        p.dx *= 0.94; p.dy *= 0.94;
      }
      p.life -= 1;
      if (p.life<=0) particles.splice(i,1);
    }

    if (hitFlash > 0) hitFlash -= 0.04;

    // spawning
    spawnTimer++;
    if (spawnTimer >= spawnInterval){
      spawnTimer = 0;
      spawnZombie();
    }
    difficultyTimer++;
    if (difficultyTimer % 300 === 0 && spawnInterval > 25){
      spawnInterval -= 5;
    }
  }

  function drawPlayer(p){
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    const s = p.size/26; // skala dasar
    const walk = p.moving ? Math.sin(p.walkCycle) : 0;
    const walk2 = p.moving ? Math.sin(p.walkCycle + Math.PI) : 0;

    ctx.shadowColor = '#3aa0ff';
    ctx.shadowBlur = 18;

    // legs (alternating swing while walking)
    ctx.fillStyle = '#1c2a3d';
    ctx.fillRect(-6*s, -2*s + walk*5*s, 5*s, 13*s);
    ctx.fillRect(1*s, -2*s + walk2*5*s, 5*s, 13*s);

    // torso
    ctx.fillStyle = '#1d4ed8';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10*s, 8*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#7fc7ff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // arms gripping the weapon (in front of the body, facing direction = positive x axis)
    ctx.fillStyle = '#16213a';
    ctx.fillRect(4*s, -7*s, 5*s, 4*s);
    ctx.fillRect(4*s, 3*s, 5*s, 4*s);

    // rifle
    ctx.fillStyle = '#2b2f36';
    ctx.fillRect(6*s, -1.5*s, 22*s, 3*s);
    ctx.fillRect(24*s, -2.5*s, 4*s, 5*s); // barrel tip
    ctx.fillStyle = '#444';
    ctx.fillRect(10*s, 1.5*s, 3*s, 5*s); // magasen

    // head
    ctx.fillStyle = '#e8b48a';
    ctx.beginPath();
    ctx.arc(0, 0 - 0, 7*s, 0, Math.PI*2); // centered, slightly overlapping the body for top-down view
    ctx.fill();
    // survivor helmet/cap
    ctx.fillStyle = '#0f2747';
    ctx.beginPath();
    ctx.arc(0, 0, 7.4*s, Math.PI*0.65, Math.PI*1.85);
    ctx.lineTo(0,0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawZombie(z){
    ctx.save();
    ctx.translate(z.x, z.y);
    ctx.rotate(z.angle);

    const s = z.size/24;
    const sway = Math.sin(z.wobble) * 0.15;
    const armSwing = Math.sin(z.limbPhase) * 4*s;

    ctx.shadowColor = '#39ff6e';
    ctx.shadowBlur = 16;

    // arms reaching forward (facing direction = positive x axis), swaying
    ctx.strokeStyle = '#2f6b35';
    ctx.lineWidth = 3.2*s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-2*s, -6*s);
    ctx.lineTo(11*s, -8*s + armSwing*0.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-2*s, 6*s);
    ctx.lineTo(11*s, 8*s - armSwing*0.6);
    ctx.stroke();

    // damaged body (uneven shape, mottled coloring)
    ctx.rotate(sway);
    ctx.fillStyle = '#2f7d3f';
    ctx.beginPath();
    ctx.moveTo(-9*s, -7*s);
    ctx.lineTo(6*s, -8*s);
    ctx.lineTo(9*s, -2*s);
    ctx.lineTo(7*s, 7*s);
    ctx.lineTo(-7*s, 8*s);
    ctx.lineTo(-9*s, 2*s);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(15,40,15,0.5)';
    ctx.beginPath();
    ctx.arc(-2*s + Math.sin(z.bodySeed)*2, 3*s, 3*s, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#14391c';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // head with glowing red eyes
    ctx.fillStyle = '#356b3e';
    ctx.beginPath();
    ctx.arc(2*s, 0, 6.5*s, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowColor = '#ff2b2b';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(5*s, -2.2*s, 1.4*s, 0, Math.PI*2);
    ctx.arc(5*s, 2.2*s, 1.4*s, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawGrid(){
    ctx.save();
    ctx.strokeStyle = 'rgba(80,120,90,0.06)';
    ctx.lineWidth = 1;
    const gap = 50;
    for (let x=0;x<canvas.width;x+=gap){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for (let y=0;y<canvas.height;y+=gap){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticle(p){
    const alpha = Math.max(p.life / p.maxLife, 0);
    ctx.save();
    ctx.globalAlpha = alpha;

    if (p.kind === 'muzzle'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.shadowColor = '#fff6c8';
      ctx.shadowBlur = 18;
      ctx.fillStyle = 'rgba(255,240,180,' + alpha + ')';
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(p.size, -p.size*0.35);
      ctx.lineTo(p.size*1.4, 0);
      ctx.lineTo(p.size, p.size*0.35);
      ctx.closePath();
      ctx.fill();
    } else if (p.kind === 'shell'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(-p.size*0.6, -p.size*0.3, p.size*1.2, p.size*0.6);
    } else if (p.kind === 'blood'){
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    } else if (p.kind === 'gib'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.shadowColor = '#39ff6e';
      ctx.shadowBlur = 6;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    } else {
      // spark / explosion: simple glowing dot
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid();

    // shell casings & gibs below the characters (ground layer)
    for (const p of particles){
      if (p.kind === 'shell' || p.kind === 'gib' || p.kind === 'blood') drawParticle(p);
    }

    // zombies
    for (const z of zombies){
      drawZombie(z);
    }

    // player
    drawPlayer(player);

    // bullets
    ctx.save();
    ctx.shadowColor = '#ffdd55';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ffdd55';
    for (const b of bullets){
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // top-layer effects: muzzle flash, spark, explosion
    for (const p of particles){
      if (p.kind === 'muzzle' || p.kind === 'spark' || p.kind === 'explosion') drawParticle(p);
    }

    if (hitFlash > 0){
      ctx.save();
      ctx.fillStyle = 'rgba(255,30,30,' + (hitFlash*0.35) + ')';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.restore();
    }
  }

  let rafId;
  let isPaused = false;
  document.addEventListener('visibilitychange', ()=>{
    if (document.hidden) isPaused = true;
    else isPaused = false;
  });

  function loop(){
    if (!isPaused) update();
    draw();
    if (gameRunning){
      rafId = requestAnimationFrame(loop);
    }
  }

  function endGame(){
    gameRunning = false;
    saveHighScore();
    finalScoreEl.textContent = 'Score: ' + score;
    finalHighEl.textContent = 'Best: ' + highScore;
    updateHUD();
    gameOverOverlay.classList.remove('hidden');
    cancelAnimationFrame(rafId);
  }

  window.startGame = function(){
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    initState();
    cancelAnimationFrame(rafId);
    loop();
  };

  updateHUD();
})();
</script>
</body>
</html>
